<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد أمي أمل 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f43f5e;
    --pink: #fb7185;
    --blush: #fda4af;
    --light: #fff1f2;
    --deep: #9f1239;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #fce4ec 0%, #ffd6e0 30%, #f8bbd0 60%, #fce4ec 100%);
    overflow-x: hidden;
    position: relative;
    user-select: none;
    touch-action: manipulation;
  }

  /* هالة ضوئية خلف الكارت */
  .glow-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: 300px;
    background: var(--pink);
    filter: blur(150px);
    opacity: 0.3;
    z-index: 1;
    border-radius: 50%;
    animation: glowPulse 5s infinite alternate;
  }

  @keyframes glowPulse {
    from { opacity: 0.2; width: 300px; }
    to { opacity: 0.5; width: 500px; }
  }

  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .bg-heart {
    position: absolute;
    animation: bgFloat linear infinite;
    opacity: 0;
    font-size: 22px;
  }

  @keyframes bgFloat {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    5%   { opacity: 0.35; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 16px 50px;
    gap: 28px;
  }

  .card {
    width: 100%;
    max-width: 580px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-radius: 40px;
    padding: 44px 32px 36px;
    box-shadow: 0 20px 50px rgba(244,63,94,0.2);
    animation: fadeUp 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    position: relative;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(50px) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-title {
    font-size: clamp(24px, 6vw, 38px);
    font-weight: 900;
    color: var(--rose);
    margin-bottom: 20px;
    text-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  .poem-box {
    font-size: clamp(16px, 4vw, 20px);
    line-height: 2.1;
    color: #5a2035;
    background: linear-gradient(135deg, #fff5f7 0%, #fce7f3 100%);
    border-radius: 22px;
    padding: 22px 20px;
    border: 1.5px solid rgba(244,63,94,0.1);
    margin-bottom: 25px;
    font-weight: 700;
    box-shadow: inset 0 2px 10px rgba(244,63,94,0.05);
  }

  .poem-line { display: block; margin-bottom: 5px; }

  .heart-wrap {
    position: relative;
    display: inline-block;
  }

  .big-heart {
    font-size: 90px;
    cursor: pointer;
    animation: heartbeat 1.5s ease-in-out infinite;
    display: inline-block;
    filter: drop-shadow(0 10px 25px rgba(244,63,94,0.4));
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 5;
    position: relative;
  }

  .big-heart:active {
    transform: scale(0.8);
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.2); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
  }

  .music-box {
    width: 100%;
    max-width: 580px;
    background: rgba(255,255,255,0.9);
    border-radius: 28px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    box-shadow: 0 8px 25px rgba(244,63,94,0.1);
    border: 1px solid rgba(244,63,94,0.1);
  }

  .play-btn {
    background: linear-gradient(135deg, var(--rose) 0%, var(--pink) 100%);
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
    box-shadow: 0 5px 15px rgba(244,63,94,0.3);
  }

  .play-btn.playing { background: #10b981; box-shadow: 0 5px 15px rgba(16,185,129,0.3); }

  .eq { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
  .eq-bar { width: 4px; background: #fff; border-radius: 2px; animation: eq 0.8s ease-in-out infinite alternate; }
  .eq.paused .eq-bar { animation-play-state: paused; }
  @keyframes eq { from { transform: scaleY(0.3); } to { transform: scaleY(1); } }

  /* ستايل العناصر المتطايرة */
  .fly-item {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    will-change: transform, opacity;
    animation: flyOut 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }

  @keyframes flyOut {
    0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(var(--sz)) rotate(var(--rt)); opacity: 0; }
  }

  .footer {
    font-size: 16px;
    text-align: center;
    color: var(--deep);
    font-weight: 700;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="glow-bg"></div>
<div class="bg-layer" id="bgLayer"></div>

<div class="page">
  <div class="card">
    <div class="card-title">عيد ميلاد سعيد يا أمي أمل ❤️</div>
    
    <div class="poem-box">
      <span class="poem-line">يا "أمل" عمري ويا نور المكان 🌸</span>
      <span class="poem-line">يا حضن دافي كله طيبة وحنان 🤍</span>
      <span class="poem-line">ست الحبايب يا أغلى من روحي 💖</span>
      <span class="poem-line">بلمسة من إيدك بتشفى جروحي ✨</span>
      <span class="poem-line">كل عام وأنتِ الخير ونبض الفؤاد 🌷</span>
      <span class="poem-line">يا جنة الدنيا.. يا أجمل أعياد 🎂</span>
    </div>

    <div class="heart-wrap">
      <span class="big-heart" id="mainHeart" onmousedown="explode(event)" ontouchstart="explode(event)">💖</span>
      <p style="color: var(--blush); margin-top: 15px; font-weight: 900; letter-spacing: 1px;">✨ اضغطي على القلب ✨</p>
    </div>
  </div>

  <div class="music-box">
    <p style="font-weight: 700; color: var(--deep);">أغنية ست الحبايب 🎵</p>
    <button class="play-btn" id="playBtn" onclick="toggleMusic()">
      <span id="btnText">تشغيل الأغنية ❤️</span>
      <div class="eq paused" id="eq">
        <div class="eq-bar"></div><div class="eq-bar" style="animation-delay:0.2s"></div><div class="eq-bar" style="animation-delay:0.4s"></div>
        <div class="eq-bar" style="animation-delay:0.1s"></div>
      </div>
    </button>
  </div>

  <div class="footer">صُنع بكل حُب 🤍<br><span style="color: var(--rose); font-size: 22px;">عبدالرحمن عاطف</span></div>
</div>

<audio id="audio" loop>
  <source src="https://files.catbox.moe/uxcp1w.m4a" type="audio/mp4">
</audio>

<script>
  const audio = document.getElementById('audio');
  const btn = document.getElementById('playBtn');
  const eq = document.getElementById('eq');
  const btnText = document.getElementById('btnText');

  function toggleMusic() {
    if (audio.paused) {
      audio.play().then(() => {
        btn.classList.add('playing');
        eq.classList.remove('paused');
        btnText.innerText = "إيقاف الأغنية ⏸️";
      }).catch(e => {
        alert("يرجى الضغط مرة أخرى لتشغيل الصوت ✨");
      });
    } else {
      audio.pause();
      btn.classList.remove('playing');
      eq.classList.add('paused');
      btnText.innerText = "تشغيل الأغنية ❤️";
    }
  }

  // وظيفة الانفجار المحسنة
  function explode(e) {
    // تحديد مكان الضغطة بدقة (سواء ماوس أو لمس)
    const x = e.clientX || (e.touches && e.touches[0].clientX);
    const y = e.clientY || (e.touches && e.touches[0].clientY);
    
    const items = ['❤️','🌸','🌹','🎂','✨','💖','💕','💝','🌷'];
    
    for(let i=0; i<40; i++) {
      const el = document.createElement('div');
      el.className = 'fly-item';
      el.innerHTML = items[Math.floor(Math.random()*items.length)];
      
      // إحداثيات عشوائية للانفجار في كل الاتجاهات
      const dx = (Math.random() - 0.5) * 500 + 'px';
      const dy = (Math.random() - 0.5) * 500 + 'px';
      const sz = Math.random() * 1.5 + 0.5;
      const rt = Math.random() * 720 + 'deg';
      
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.setProperty('--dx', dx);
      el.style.setProperty('--dy', dy);
      el.style.setProperty('--sz', sz);
      el.style.setProperty('--rt', rt);
      
      document.body.appendChild(el);
      
      // حذف العنصر بعد انتهاء الحركة
      setTimeout(() => el.remove(), 1500);
    }
  }

  // تأثير النجوم عند تحريك اليد على الشاشة
  document.addEventListener('touchmove', (e) => {
    if(Math.random() > 0.8) {
      const x = e.touches[0].clientX;
      const y = e.touches[0].clientY;
      const star = document.createElement('div');
      star.className = 'fly-item';
      star.innerHTML = '✨';
      star.style.left = x + 'px';
      star.style.top = y + 'px';
      star.style.setProperty('--dx', (Math.random()-0.5)*50+'px');
      star.style.setProperty('--dy', (Math.random()-0.5)*50+'px');
      star.style.setProperty('--sz', '0.5');
      star.style.setProperty('--rt', '0deg');
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 800);
    }
  });

  // قلوب الخلفية المستمرة
  const bg = document.getElementById('bgLayer');
  function createBgHeart() {
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.innerHTML = ['💖','🌸','✨','🤍'][Math.floor(Math.random()*4)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = 5 + Math.random()*10 + 's';
    bg.appendChild(h);
    setTimeout(() => h.remove(), 15000);
  }
  setInterval(createBgHeart, 400);
</script>
</body>
</html>
